<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJA · Generador de Certificados</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Poppins:wght@400;500;600;700&family=Damion&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="cert-render.js"></script>

<style>
  :root{ --kja-azul:#1a4b8c; --kja-azul-osc:#15315f; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Poppins',system-ui,sans-serif;background:#eef1f6;color:#1f2937;display:flex;min-height:100vh;}
  .panel{width:380px;flex-shrink:0;background:#fff;border-right:1px solid #e2e8f0;padding:24px;overflow-y:auto;height:100vh;}
  .panel h1{font-size:18px;color:var(--kja-azul);margin-bottom:4px;}
  .panel .sub{font-size:12px;color:#64748b;margin-bottom:20px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:#334155;}
  .field input,.field select{width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;font-family:inherit;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--kja-azul);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .hint{font-size:11px;color:#94a3b8;margin-top:3px;}
  .codigo-preview{margin-top:6px;font-size:13px;font-weight:700;color:var(--kja-azul);background:#f1f5f9;padding:6px 10px;border-radius:6px;text-align:center;}
  .btn-primary{width:100%;margin-top:18px;padding:13px;border:none;border-radius:9px;background:var(--kja-azul);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  .btn-primary:hover{background:var(--kja-azul-osc);}
  .btn-primary:disabled{opacity:.6;cursor:default;}
  .btns{display:flex;gap:10px;margin-top:10px;}
  .btn{flex:1;padding:10px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;color:#334155;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;}
  .btn:hover{background:#f1f5f9;}
  .status{margin-top:12px;font-size:13px;border-radius:8px;padding:9px 11px;display:none;}
  .status.ok{background:#dcfce7;color:#166534;display:block;}
  .status.error{background:#fee2e2;color:#b91c1c;display:block;}
  .status.info{background:#fef9c3;color:#854d0e;display:block;}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;}
  #cert{max-width:100%;max-height:calc(100vh - 48px);height:auto;box-shadow:0 10px 40px rgba(0,0,0,.18);background:#fff;}
</style>
</head>
<body>

<aside class="panel">
  <h1>Generar Certificado</h1>
  <div class="sub">Panel KJA</div>

  <div class="field">
    <label>Tipo de certificado</label>
    <select id="f-tipo">
      <option value="taller">Certificado de Taller</option>
      <option value="curso">Certificado de Curso</option>
      <option value="especializacion">Certificado de Curso de Especialización</option>
      <option value="constancia">Constancia de Taller Presencial</option>
    </select>
  </div>

  <div class="field">
    <label>Cliente / Alumno (escribe nuevo o elige existente)</label>
    <input id="f-nombre" type="text" list="clientes-list" value="Adriana Lucia Candiotti Francia" autocomplete="off">
    <datalist id="clientes-list"></datalist>
  </div>
  <div class="field">
    <label>DNI (opcional)</label>
    <input id="f-dni" type="text" placeholder="Opcional — se podrá buscar por esto">
  </div>

  <div class="field"><label id="lbl-titulo">Nombre del taller</label>
    <input id="f-titulo" type="text" value="Test de Habilidades Sociales en Adolescentes"></div>
  <div class="field"><label>Duración (horas académicas)</label>
    <input id="f-duracion" type="number" value="20" min="1"></div>

  <div class="row2">
    <div class="field" id="wrap-inicio"><label id="lbl-inicio">Fecha del periodo</label>
      <input id="f-inicio" type="date" value="2025-03-09"></div>
    <div class="field" id="wrap-fin" style="display:none;"><label>Hasta</label>
      <input id="f-fin" type="date" value="2025-06-09"></div>
  </div>
  <div class="field"><label>Fecha de emisión (define mes/año del código)</label>
    <input id="f-emision" type="date" value="2025-03-10"></div>
  <div class="field"><label>Número de certificado</label>
    <input id="f-numero" type="text" value="8148">
    <div class="codigo-preview" id="codigo-preview">KJA FEB-8148-2025</div>
    <div class="hint">El mes y el año salen de la fecha de emisión.</div>
  </div>

  <button class="btn-primary" id="btn-guardar">Guardar y generar (PDF)</button>
  <div class="btns">
    <button class="btn" id="btn-png">Descargar PNG</button>
    <button class="btn" id="btn-pdf">Solo PDF (sin guardar)</button>
  </div>
  <div class="status" id="status"></div>
</aside>

<main class="stage">
  <canvas id="cert" width="2000" height="1414"></canvas>
</main>

<script>
const SUPABASE_URL  = "https://xadxmfgdxwplmhijagix.supabase.co";
const SUPABASE_ANON = "sb_publishable_0j8mktN5G8BXS9r8tl9ETw_-GSBMkub";
const db = (SUPABASE_URL && SUPABASE_ANON) ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

const $=id=>document.getElementById(id);
const canvas=$('cert');

function leerDatos(){
  const tipo=$('f-tipo').value, cfg=KJACert.TIPOS[tipo];
  const codigo=KJACert.codigoDe($('f-numero').value, $('f-emision').value);
  return {
    tipo, cfg,
    nombre:$('f-nombre').value.trim(),
    dni:$('f-dni').value.trim(),
    titulo:$('f-titulo').value.trim(),
    duracion:$('f-duracion').value,
    fechaInicio:$('f-inicio').value,
    fechaFin: cfg.fechas==='rango' ? $('f-fin').value : null,
    fechaEmision:$('f-emision').value,
    codigo
  };
}

function actualizarUI(){
  const d=leerDatos(), cfg=d.cfg;
  $('lbl-titulo').textContent=cfg.etiquetaTitulo;
  $('wrap-fin').style.display=cfg.fechas==='rango'?'block':'none';
  $('lbl-inicio').textContent=cfg.fechas==='rango'?'Periodo: desde':'Fecha del periodo';
  $('codigo-preview').textContent=d.codigo;
}
function dibujar(){ actualizarUI(); KJACert.render(canvas, leerDatos()); }

function nombreArchivo(d){ return `${d.codigo.replace(/[^a-z0-9]/gi,'_')}_${d.nombre.replace(/\s+/g,'_')}`; }
function status(txt,tipo){ const el=$('status'); el.textContent=txt; el.className='status '+(tipo||'info'); if(!txt) el.style.display='none'; }

async function cargarClientes(){
  if(!db) return;
  const {data}=await db.from('clientes').select('nombre').order('nombre');
  const dl=$('clientes-list'); dl.innerHTML='';
  (data||[]).forEach(c=>{ const o=document.createElement('option'); o.value=c.nombre; dl.appendChild(o); });
}

async function guardarYGenerar(){
  const d=leerDatos();
  if(!db){ status('Supabase no está configurado.','error'); return; }
  if(!d.nombre || !d.titulo){ status('Completa el cliente y el título.','error'); return; }
  const btn=$('btn-guardar'); btn.disabled=true; status('Guardando…','info');
  try{
    // 1) Buscar o crear el cliente (por DNI si lo hay, si no por nombre)
    let clienteId=null;
    let q = db.from('clientes').select('id').limit(1);
    q = d.dni ? q.eq('dni', d.dni) : q.ilike('nombre', d.nombre);
    const {data:cli, error:e1}=await q;
    if(e1) throw e1;
    if(cli && cli.length){ clienteId=cli[0].id; }
    else{
      const {data:nuevo, error:e2}=await db.from('clientes')
        .insert({nombre:d.nombre, dni:d.dni||null}).select('id').single();
      if(e2) throw e2;
      clienteId=nuevo.id;
    }
    // 2) Insertar el certificado
    const {error:e3}=await db.from('certificados').insert({
      codigo:d.codigo, tipo:d.tipo, nombre:d.nombre, dni:d.dni||null, titulo:d.titulo,
      duracion:d.duracion, fecha_inicio:d.fechaInicio||null, fecha_fin:d.fechaFin||null,
      fecha_emision:d.fechaEmision||null, cliente_id:clienteId
    });
    if(e3){
      if(e3.code==='23505') status('Ese código ya existe. Cambia el número de certificado.','error');
      else status('Error al guardar: '+e3.message,'error');
      btn.disabled=false; return;
    }
    // 3) Descargar el PDF
    status('✓ Guardado en la base de datos. Descargando PDF…','ok');
    KJACert.exportar(canvas, nombreArchivo(d), 'pdf');
    cargarClientes();
  }catch(err){
    status('Error: '+(err.message||err),'error');
  }finally{ btn.disabled=false; }
}

['f-tipo','f-nombre','f-dni','f-titulo','f-duracion','f-inicio','f-fin','f-emision','f-numero']
  .forEach(id=>$(id).addEventListener('input',dibujar));
$('btn-guardar').addEventListener('click',guardarYGenerar);
$('btn-png').addEventListener('click',()=>KJACert.exportar(canvas, nombreArchivo(leerDatos()),'png'));
$('btn-pdf').addEventListener('click',()=>KJACert.exportar(canvas, nombreArchivo(leerDatos()),'pdf'));

KJACert.preloadFonts().then(dibujar).catch(dibujar);
dibujar(); cargarClientes();
</script>
</body>
</html>
